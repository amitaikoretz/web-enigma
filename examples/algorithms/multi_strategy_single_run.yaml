global_config:
  timezone: "UTC"
  default_broker:
    cash: 10000
    commission: 0.001
    slippage_perc: 0.0
    sizer: fixed

runs:
  - run_id: "csv_intraday_pack_sma"
    name: "CSV SMA Cross"
    start_date: "2024-01-01"
    end_date: "2024-01-19"
    data:
      type: csv
      path: "examples/data/sample_daily.csv"
    trigger_path: "examples/triggers/sma_cross.yaml"
    exit_rules_path: "examples/exit_rules/sma_cross_exits.yaml"

  - run_id: "csv_intraday_pack_rsi"
    name: "CSV RSI Reversion"
    start_date: "2024-01-01"
    end_date: "2024-01-19"
    data:
      type: csv
      path: "examples/data/sample_daily.csv"
    trigger_path: "examples/triggers/rsi_reversion.yaml"
    exit_rules_path: "examples/exit_rules/rsi_reversion_exits.yaml"

  - run_id: "csv_intraday_pack_breakout"
    name: "CSV Breakout Channel"
    start_date: "2024-01-01"
    end_date: "2024-01-19"
    data:
      type: csv
      path: "examples/data/sample_daily.csv"
    trigger_path: "examples/triggers/breakout_channel.yaml"
    exit_rules_path: "examples/exit_rules/breakout_channel_exits.yaml"
