global_config:
  timezone: "UTC"
  default_broker:
    cash: 10000
    commission: 0.001
    slippage_perc: 0.0
    sizer: fixed

runs:
  - run_id: "csv_sma_cross"
    name: "CSV SMA Demo"
    start_date: "2024-01-01"
    end_date: "2024-01-19"
    data:
      type: alpaca
      symbol: AAPL
      interval: 1m
    trigger_path: "examples/triggers/sma_cross.yaml"
    exit_rules_path: "examples/exit_rules/sma_cross_exits.yaml"
    analyzers:
      include_equity_curve: true
      include_trade_log: true
      include_order_log: true

  - run_id: "csv_rsi_reversion"
    name: "CSV RSI Demo"
    start_date: "2024-01-01"
    end_date: "2024-01-19"
    data:
      type: csv
      path: "examples/data/sample_daily.csv"
    trigger_path: "examples/triggers/rsi_reversion.yaml"
    exit_rules_path: "examples/exit_rules/rsi_reversion_exits.yaml"

  - run_id: "yahoo_buy_and_hold"
    name: "Yahoo Buy & Hold Demo"
    start_date: "2024-01-01"
    end_date: "2024-03-31"
    data:
      type: yahoo
      symbol: AAPL
      interval: 1d
    trigger_path: "examples/triggers/buy_and_hold.yaml"
    exit_rules_path: "examples/exit_rules/basic_sl_tp_time.yaml"
