  - run_id: "nvda_1m_dense"
    name: "NVDA Dense Intraday 1m"
    start_date: "2026-01-05"
    end_date: "2026-02-27"
    data:
      type: alpaca
      symbol: NVDA
      interval: 1m
      feed: sip
    strategies:
      - name: "sma_cross"
        params:
          fast: 3
          slow: 8
          stake: 8
          stop_loss_pct: 0.004
          take_profit_pct: 0.005
          max_hold_bars: 18
      - name: "rsi_reversion"
        params:
          period: 5
          oversold: 36
          overbought: 50
          stake: 8
          stop_loss_pct: 0.003
          take_profit_pct: 0.0035
