global_config:
  timezone: "America/New_York"
  default_broker:
    cash: 100000
    commission: 0.0005
    slippage_perc: 0.0005
    sizer: fixed
  data_cache:
    enabled: true
    directory: ".cache/backtest-data"
    refresh_policy: "ttl"
    ttl_by_interval:
      1m: 600
      5m: 1800
      15m: 3600
      1h: 21600
      1d: 86400

runs:
  - run_id: "spy_1m_dense"
    name: "SPY Dense Intraday 1m"
    start_date: "2026-01-05"
    end_date: "2026-02-27"
    data:
      type: alpaca
      symbol: SPY
      interval: 1m
      feed: sip
    strategies:
      - name: "sma_cross"
        params:
          fast: 3
          slow: 8
          stake: 20
          stop_loss_pct: 0.002
          take_profit_pct: 0.003
          max_hold_bars: 20
      - name: "rsi_reversion"
        params:
          period: 5
          oversold: 38
          overbought: 52
          stake: 20
          stop_loss_pct: 0.0015
          take_profit_pct: 0.0025
          max_hold_bars: 15
      - name: "breakout_channel"
        params:
          lookback: 6
          stake: 20
          stop_loss_pct: 0.002
          take_profit_pct: 0.0035
          max_hold_bars: 20

  - run_id: "qqq_1m_dense"
    name: "QQQ Dense Intraday 1m"
    start_date: "2026-01-05"
    end_date: "2026-02-27"
    data:
      type: alpaca
      symbol: QQQ
      interval: 1m
      feed: sip
    strategies:
      - name: "sma_cross"
        params:
          fast: 3
          slow: 8
          stake: 15
          stop_loss_pct: 0.0025
          take_profit_pct: 0.0035
          max_hold_bars: 20
      - name: "buy_oco_atr_tp_sl"
        params:
          stake: 15
          atr_period: 6
          entry_sma: 6
          sl_atr_mult: 1.0
          tp_atr_mult: 1.4
          max_hold_bars: 18
      - name: "buy_oco_atr_tp_trailing"
        params:
          stake: 15
          atr_period: 6
          entry_sma: 6
          trail_atr_mult: 0.6
          tp_atr_mult: 1.3
          max_hold_bars: 24

  - run_id: "iwm_1m_dense"
    name: "IWM Dense Intraday 1m"
    start_date: "2026-01-05"
    end_date: "2026-02-27"
    data:
      type: alpaca
      symbol: IWM
      interval: 1m
      feed: sip
    strategies:
      - name: "sma_cross"
        params:
          fast: 3
          slow: 7
          stake: 20
          stop_loss_pct: 0.0025
          take_profit_pct: 0.0035
          max_hold_bars: 20
      - name: "rsi_reversion"
        params:
          period: 5
          oversold: 37
          overbought: 51
          stake: 20
          stop_loss_pct: 0.002
          take_profit_pct: 0.0028
          max_hold_bars: 15
      - name: "breakout_channel"
        params:
          lookback: 5
          stake: 20
          stop_loss_pct: 0.0025
          take_profit_pct: 0.004
          max_hold_bars: 20

  - run_id: "aapl_1m_dense"
    name: "AAPL Dense Intraday 1m"
    start_date: "2026-01-05"
    end_date: "2026-02-27"
    data:
      type: alpaca
      symbol: AAPL
      interval: 1m
      feed: sip
    strategies:
      - name: "sma_cross"
        params:
          fast: 3
          slow: 9
          stake: 10
          stop_loss_pct: 0.003
          take_profit_pct: 0.004
          max_hold_bars: 20
      - name: "buy_oco_atr_tp_sl"
        params:
          stake: 10
          atr_period: 6
          entry_sma: 7
          sl_atr_mult: 1.1
          tp_atr_mult: 1.5
          max_hold_bars: 18
      - name: "buy_oco_atr_tp_trailing"
        params:
          stake: 10
          atr_period: 6
          entry_sma: 7
          trail_atr_mult: 0.65
          tp_atr_mult: 1.4
