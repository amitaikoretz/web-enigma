entrypoint: __ENTRYPOINT__
serviceAccountName: __SERVICE_ACCOUNT__
templates:
  - name: refresh-workflow
    steps:
      - - name: print-payload
          template: print-payload
        - name: refresh
          template: refresh
  - name: sync-registry-workflow
    steps:
      - - name: print-payload
          template: print-payload
        - name: sync-registry
          template: sync-registry
  - name: print-payload
    retryStrategy: {limit: 3, retryPolicy: Always}
    container:
      image: __WORKFLOW_IMAGE__
      imagePullPolicy: IfNotPresent
      command: ["python", "-m", "app.standalone.print_argo_command"]
      args:
        - --terminal-command-out
        - /tmp/terminal-command.txt
        - --command-line
        - "__COMMAND_LINE__"
      envFrom:
        - secretRef: {name: __SECRET_NAME__}
    outputs:
      parameters:
        - {name: terminal-command, valueFrom: {path: /tmp/terminal-command.txt}}
        - {name: error-exception, valueFrom: {path: /tmp/error-exception.txt}}
        - {name: error-code-location, valueFrom: {path: /tmp/error-code-location.txt}}
        - {name: error-call-stack, valueFrom: {path: /tmp/error-call-stack.txt}}
        - {name: error-traceback, valueFrom: {path: /tmp/error-traceback.txt}}
  - name: refresh
    container:
      image: __WORKFLOW_IMAGE__
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c"]
      args:
        - "printf '%s\n' __COMMAND_LINE__ > /tmp/argo-command-line.txt; exec __COMMAND_LINE__"
      envFrom:
        - secretRef: {name: __SECRET_NAME__}
    outputs:
      parameters:
        - {name: terminal-command, valueFrom: {path: /tmp/argo-command-line.txt}}
  - name: sync-registry
    container:
      image: __WORKFLOW_IMAGE__
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c"]
      args:
        - "printf '%s\n' __COMMAND_LINE__ > /tmp/argo-command-line.txt; exec __COMMAND_LINE__"
      envFrom:
        - secretRef: {name: __SECRET_NAME__}
    outputs:
      parameters:
        - {name: terminal-command, valueFrom: {path: /tmp/argo-command-line.txt}}
