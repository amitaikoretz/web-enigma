apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: datasets-download-template
spec:
  entrypoint: main
  serviceAccountName: __SERVICE_ACCOUNT__
  parallelism: __MAX_PODS__
  arguments:
    parameters:
      - name: symbols
      - name: provider
      - name: resolution
      - name: start-date
      - name: end-date
      - name: options-enabled
      - name: options-feed
      - name: output-dir
      - name: options-enabled-flag
  volumes:
    - name: datasets-results
      persistentVolumeClaim:
        claimName: backtest-results
  templates:
    - name: main
      steps:
        - - name: print-payload
            template: print-payload
        - - name: plan
            template: plan-shards
            arguments:
              parameters:
                - name: symbols
                  value: "{{workflow.parameters.symbols}}"
                - name: provider
                  value: "{{workflow.parameters.provider}}"
                - name: resolution
                  value: "{{workflow.parameters.resolution}}"
                - name: start-date
                  value: "{{workflow.parameters.start-date}}"
                - name: end-date
                  value: "{{workflow.parameters.end-date}}"
                - name: options-enabled
                  value: "{{workflow.parameters.options-enabled}}"
                - name: options-feed
                  value: "{{workflow.parameters.options-feed}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-dir}}"
        - - name: download-shards
            template: download-shard
            parallelism: __MAX_PODS__
            arguments:
              parameters:
                - name: shard-id
                  value: "{{item.shard_id}}"
                - name: symbols
                  value: "{{item.symbols_csv}}"
                - name: provider
                  value: "{{workflow.parameters.provider}}"
                - name: resolution
                  value: "{{workflow.parameters.resolution}}"
                - name: start-date
                  value: "{{workflow.parameters.start-date}}"
                - name: end-date
                  value: "{{workflow.parameters.end-date}}"
                - name: options-enabled
                  value: "{{workflow.parameters.options-enabled}}"
                - name: options-feed
                  value: "{{workflow.parameters.options-feed}}"
                - name: output-dir
                  value: "{{item.output_dir}}"
                - name: progress-total-units
                  value: "{{item.progress_total_units}}"
                - name: progress-symbol-units
                  value: "{{item.progress_symbol_units}}"
            withParam: "{{steps.plan.outputs.parameters.shards}}"
        - - name: combine
            template: combine-shards
            arguments:
              parameters:
                - name: plan-path
                  value: "{{steps.plan.outputs.parameters.plan-path}}"
                - name: dataset-path-out
                  value: /tmp/dataset-path.txt
                - name: manifest-path-out
                  value: /tmp/manifest-path.txt
                - name: options-dataset-path-out
                  value: /tmp/options-dataset-path.txt
                - name: options-manifest-path-out
                  value: /tmp/options-manifest-path.txt
    - name: print-payload
      retryStrategy: {limit: 3, retryPolicy: Always}
      container:
        image: __WORKFLOW_IMAGE__
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.standalone.print_argo_command"]
        args:
          - "--terminal-command-out"
          - "/tmp/terminal-command.txt"
          - "--command-line"
          - "__COMMAND_LINE__"
        envFrom:
          - secretRef:
              name: app-secrets
        env:
          - name: ARGO_PROGRESS_FILE
            value: /tmp/argo-progress.txt
        volumeMounts:
          - name: datasets-results
            mountPath: __WORKFLOW_RESULTS_MOUNT__
      outputs:
        parameters:
          - name: terminal-command
            valueFrom:
              path: /tmp/terminal-command.txt
          - name: error-exception
            valueFrom:
              path: /tmp/error-exception.txt
          - name: error-code-location
            valueFrom:
              path: /tmp/error-code-location.txt
          - name: error-call-stack
            valueFrom:
              path: /tmp/error-call-stack.txt
          - name: error-traceback
            valueFrom:
              path: /tmp/error-traceback.txt
    - name: plan-shards
      inputs:
        parameters:
          - name: symbols
          - name: provider
          - name: resolution
          - name: start-date
          - name: end-date
          - name: options-enabled
          - name: options-feed
          - name: output-dir
      container:
        image: __WORKFLOW_IMAGE__
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.standalone.datasets_download_argo"]
        args:
          - "plan-shards"
          - "--terminal-command-out"
          - "/tmp/terminal-command.txt"
          - "--symbol"
          - "{{inputs.parameters.symbols}}"
          - "--provider"
          - "{{inputs.parameters.provider}}"
          - "--resolution"
          - "{{inputs.parameters.resolution}}"
          - "--start-date"
          - "{{inputs.parameters.start-date}}"
          - "--end-date"
          - "{{inputs.parameters.end-date}}"
          - "{{workflow.parameters.options-enabled-flag}}"
          - "--options-feed"
          - "{{inputs.parameters.options-feed}}"
          - "--output-dir"
          - "{{inputs.parameters.output-dir}}"
          - "--plan-path-out"
          - "/tmp/plan-path.txt"
          - "--work-dir-out"
          - "/tmp/work-dir.txt"
          - "--shards-param-out"
          - "/tmp/shards-param.json"
        envFrom:
          - secretRef:
              name: app-secrets
        env:
          - name: ARGO_PROGRESS_FILE
            value: /tmp/argo-progress.txt
        volumeMounts:
          - name: datasets-results
            mountPath: __WORKFLOW_RESULTS_MOUNT__
      outputs:
        parameters:
          - name: plan-path
            valueFrom:
              path: /tmp/plan-path.txt
          - name: work-dir
            valueFrom:
              path: /tmp/work-dir.txt
          - name: shards
            valueFrom:
              path: /tmp/shards-param.json
          - name: terminal-command
            valueFrom:
              path: /tmp/terminal-command.txt
          - name: error-exception
            valueFrom:
              path: /tmp/error-exception.txt
          - name: error-code-location
            valueFrom:
              path: /tmp/error-code-location.txt
          - name: error-call-stack
            valueFrom:
              path: /tmp/error-call-stack.txt
          - name: error-traceback
            valueFrom:
              path: /tmp/error-traceback.txt
    - name: download-shard
      metadata:
        annotations:
          workflows.argoproj.io/progress: "0/100"
      inputs:
        parameters:
          - name: shard-id
          - name: symbols
          - name: provider
          - name: resolution
          - name: start-date
          - name: end-date
          - name: options-enabled
          - name: options-feed
          - name: output-dir
          - name: progress-total-units
          - name: progress-symbol-units
      container:
        image: __WORKFLOW_IMAGE__
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.standalone.datasets_download_argo"]
        args:
          - "download-shard"
          - "--terminal-command-out"
          - "/tmp/terminal-command.txt"
          - "--shard-id"
          - "{{inputs.parameters.shard-id}}"
          - "--symbols"
          - "{{inputs.parameters.symbols}}"
          - "--provider"
          - "{{inputs.parameters.provider}}"
          - "--resolution"
          - "{{inputs.parameters.resolution}}"
          - "--start-date"
          - "{{inputs.parameters.start-date}}"
          - "--end-date"
          - "{{inputs.parameters.end-date}}"
          - "{{workflow.parameters.options-enabled-flag}}"
          - "--options-feed"
          - "{{inputs.parameters.options-feed}}"
          - "--output-dir"
          - "{{inputs.parameters.output-dir}}"
          - "--progress-total-units"
          - "{{inputs.parameters.progress-total-units}}"
          - "--progress-symbol-units"
          - "{{inputs.parameters.progress-symbol-units}}"
        envFrom:
          - secretRef:
              name: app-secrets
        env:
          - name: ARGO_PROGRESS_FILE
            value: /tmp/argo-progress.txt
        volumeMounts:
          - name: datasets-results
            mountPath: __WORKFLOW_RESULTS_MOUNT__
      outputs:
        parameters:
          - name: terminal-command
            valueFrom:
              path: /tmp/terminal-command.txt
          - name: error-exception
            valueFrom:
              path: /tmp/error-exception.txt
          - name: error-code-location
            valueFrom:
              path: /tmp/error-code-location.txt
          - name: error-call-stack
            valueFrom:
              path: /tmp/error-call-stack.txt
          - name: error-traceback
            valueFrom:
              path: /tmp/error-traceback.txt
    - name: combine-shards
      metadata:
        annotations:
          workflows.argoproj.io/progress: "0/100"
      inputs:
        parameters:
          - name: plan-path
          - name: dataset-path-out
          - name: manifest-path-out
          - name: options-dataset-path-out
          - name: options-manifest-path-out
      container:
        image: __WORKFLOW_IMAGE__
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.standalone.datasets_download_argo"]
        args:
          - "combine-shards"
          - "--terminal-command-out"
          - "/tmp/terminal-command.txt"
          - "--plan-path"
          - "{{inputs.parameters.plan-path}}"
          - "--dataset-path-out"
          - "{{inputs.parameters.dataset-path-out}}"
          - "--manifest-path-out"
          - "{{inputs.parameters.manifest-path-out}}"
          - "--options-dataset-path-out"
          - "{{inputs.parameters.options-dataset-path-out}}"
          - "--options-manifest-path-out"
          - "{{inputs.parameters.options-manifest-path-out}}"
        envFrom:
          - secretRef:
              name: app-secrets
        env:
          - name: ARGO_PROGRESS_FILE
            value: /tmp/argo-progress.txt
        volumeMounts:
          - name: datasets-results
            mountPath: __WORKFLOW_RESULTS_MOUNT__
      outputs:
        parameters:
          - name: dataset-path
            valueFrom:
              path: /tmp/dataset-path.txt
          - name: manifest-path
            valueFrom:
              path: /tmp/manifest-path.txt
          - name: options-dataset-path
            valueFrom:
              path: /tmp/options-dataset-path.txt
          - name: options-manifest-path
            valueFrom:
              path: /tmp/options-manifest-path.txt
          - name: terminal-command
            valueFrom:
              path: /tmp/terminal-command.txt
          - name: error-exception
            valueFrom:
              path: /tmp/error-exception.txt
          - name: error-code-location
            valueFrom:
              path: /tmp/error-code-location.txt
          - name: error-call-stack
            valueFrom:
              path: /tmp/error-call-stack.txt
          - name: error-traceback
            valueFrom:
              path: /tmp/error-traceback.txt
