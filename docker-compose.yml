x-app-environment: &app-environment
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/backtest
  REDIS_URL: redis://redis:6379/0
  REDIS_KEY_PREFIX: ta
  LIVE_REDIS_URL: redis://redis:6379/0
  LIVE_REDIS_KEY_PREFIX: ta
  ALPACA_API_KEY: ${ALPACA_API_KEY:-}
  ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}

x-app-depends: &app-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

x-python-volumes: &python-volumes
  - ./src:/app/src
  - ./alembic:/app/alembic
  - ./alembic.ini:/app/alembic.ini:ro
  - ./pyproject.toml:/app/pyproject.toml:ro

x-live-service-volumes: &live-service-volumes
  - ./src:/app/src
  - ./alembic:/app/alembic
  - ./alembic.ini:/app/alembic.ini:ro
  - ./pyproject.toml:/app/pyproject.toml:ro
  - ./examples/live/compose.yaml:/app/config/live.yaml:ro

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backtest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backtest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      <<: *app-environment
    volumes: *python-volumes
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: backtest serve --host 0.0.0.0 --port 8000
    environment:
      <<: *app-environment
      LIVE_SHARD_COUNT: "2"
    volumes: *python-volumes
    ports:
      - "8000:8000"
    depends_on:
      <<: *app-depends
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  controller:
    build: .
    command: backtest live-controller --config /app/config/live.yaml
    environment:
      <<: *app-environment
    volumes: *live-service-volumes
    depends_on:
      <<: *app-depends
      api:
        condition: service_healthy

  worker-0:
    build: .
    command: backtest live-worker --config /app/config/live.yaml --shard-id 0
    environment:
      <<: *app-environment
    volumes: *live-service-volumes
    depends_on:
      <<: *app-depends
      controller:
        condition: service_started

  worker-1:
    build: .
    command: backtest live-worker --config /app/config/live.yaml --shard-id 1
    environment:
      <<: *app-environment
    volumes: *live-service-volumes
    depends_on:
      <<: *app-depends
      controller:
        condition: service_started

  reconciler:
    image: backtest-app:latest
    build: .
    command: backtest live-reconciler --config /app/config/live.yaml
    environment:
      <<: *app-environment
    volumes: *live-service-volumes
    depends_on:
      <<: *app-depends
      api:
        condition: service_healthy

  web:
    #profiles: ["web"]
    build:
      context: web
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "8080:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
