apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: live-runtime
spec:
  serviceName: worker
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      terminationGracePeriodSeconds: 900
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://api:8000/health; do echo waiting for api; sleep 2; done
      containers:
        - name: worker
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - exec backtest live-worker --config /app/config/live.yaml --shard-id "${HOSTNAME##*-}"
          envFrom:
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: live-config
              mountPath: /app/config/live.yaml
              subPath: live.yaml
              readOnly: true
      volumes:
        - name: live-config
          configMap:
            name: live-config
