apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      serviceAccountName: api
      initContainers:
        - name: check-cli
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - command -v kalyxctl >/dev/null 2>&1
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: migrate
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: app-secrets
      containers:
        - name: api
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["kalyxctl", "serve", "--host", "0.0.0.0", "--port", "8000"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: backtest-config
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: REDIS_KEY_PREFIX
              value: ta
            - name: LIVE_REDIS_URL
              value: redis://redis:6379/0
            - name: LIVE_REDIS_KEY_PREFIX
              value: ta
            - name: LIVE_SHARD_COUNT
              value: "2"
            - name: BACKTEST_ARGO_ENABLED
              value: "true"
          volumeMounts:
            - name: backtest-results
              mountPath: /data/backtest-results
            - name: backtest-cache
              mountPath: /data/cache
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: backtest-results
          persistentVolumeClaim:
            claimName: backtest-results
        - name: backtest-cache
          persistentVolumeClaim:
            claimName: backtest-cache
