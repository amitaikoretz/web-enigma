apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      initContainers:
        - name: migrate
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: app-secrets
      containers:
        - name: api
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["backtest", "serve", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: app-secrets
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: REDIS_KEY_PREFIX
              value: ta
            - name: LIVE_REDIS_URL
              value: redis://redis:6379/0
            - name: LIVE_REDIS_KEY_PREFIX
              value: ta
            - name: LIVE_SHARD_COUNT
              value: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
