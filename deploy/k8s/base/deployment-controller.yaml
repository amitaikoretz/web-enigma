apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: live-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: controller
    spec:
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://api:8000/health; do echo waiting for api; sleep 2; done
      containers:
        - name: controller
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["backtest", "live-controller", "--config", "/app/config/live.yaml"]
          envFrom:
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: live-config
              mountPath: /app/config/live.yaml
              subPath: live.yaml
              readOnly: true
      volumes:
        - name: live-config
          configMap:
            name: live-config
