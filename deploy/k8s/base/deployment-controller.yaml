apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: live-runtime
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: controller
    spec:
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              i=0
              until wget -qO- http://api:8000/health >/dev/null 2>&1; do
                i=$((i+1))
                if [ "$i" -ge 150 ]; then
                  echo "api did not become ready in time" >&2
                  exit 1
                fi
                echo "waiting for api..."
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: check-cli
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - command -v kalyxctl >/dev/null 2>&1
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: controller
          image: backtest-app:latest
          imagePullPolicy: IfNotPresent
          command: ["kalyxctl", "live-controller", "--config", "/app/config/live.yaml"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          envFrom:
            - secretRef:
                name: app-secrets
          readinessProbe:
            exec:
              command: ["sh", "-c", "command -v kalyxctl >/dev/null 2>&1"]
            initialDelaySeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: live-config
              mountPath: /app/config/live.yaml
              subPath: live.yaml
              readOnly: true
      volumes:
        - name: live-config
          configMap:
            name: live-config
