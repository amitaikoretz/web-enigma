apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: backtest-batch
  labels:
    app.kubernetes.io/name: backtest-batch
    app.kubernetes.io/component: backtest
spec:
  entrypoint: backtest-batch
  serviceAccountName: backtest-workflow
  ttlStrategy:
    secondsAfterCompletion: 604800
  arguments:
    parameters:
      - name: api-base-url
        value: http://api.backtest.svc.cluster.local:8000
      - name: config-path
      - name: output-path
      - name: split-by
        value: ""
      - name: backtest-id
        value: ""
      - name: config-b64
        value: ""
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  volumes:
    - name: backtest-results
      persistentVolumeClaim:
        claimName: backtest-results
    - name: backtest-cache
      persistentVolumeClaim:
        claimName: backtest-cache
  templates:
    - name: backtest-batch
      steps:
        - - name: print-payload
            template: print-payload
            arguments:
              parameters:
                - name: api-base-url
                  value: "{{workflow.parameters.api-base-url}}"
                - name: config-path
                  value: "{{workflow.parameters.config-path}}"
                - name: config-b64
                  value: "{{workflow.parameters.config-b64}}"
                - name: split-by
                  value: "{{workflow.parameters.split-by}}"
                - name: backtest-id
                  value: "{{workflow.parameters.backtest-id}}"
                - name: output-path
                  value: "{{workflow.parameters.output-path}}"
        - - name: plan
            template: plan-shards
            arguments:
              parameters:
                - name: config-path
                  value: "{{workflow.parameters.config-path}}"
                - name: config-b64
                  value: "{{workflow.parameters.config-b64}}"
                - name: split-by
                  value: "{{workflow.parameters.split-by}}"
                - name: backtest-id
                  value: "{{workflow.parameters.backtest-id}}"
        - - name: run-shards
            template: run-shard
            arguments:
              parameters:
                - name: shard-id
                  value: "{{item.shard_id}}"
                - name: shard-config-path
                  value: "{{item.config_path}}"
                - name: shard-output-path
                  value: "{{item.output_path}}"
            withParam: "{{steps.plan.outputs.parameters.shards}}"
        - - name: merge
            template: merge-reports
            arguments:
              parameters:
                - name: manifest-path
                  value: "{{steps.plan.outputs.parameters.manifest-path}}"
                - name: output-path
                  value: "{{workflow.parameters.output-path}}"
                - name: backtest-id
                  value: "{{workflow.parameters.backtest-id}}"

    - name: print-payload
      inputs:
        parameters:
          - name: api-base-url
          - name: config-path
          - name: config-b64
          - name: split-by
          - name: backtest-id
          - name: output-path
      container:
        image: backtest-app:latest
        imagePullPolicy: IfNotPresent
        command: ["backtest", "print-argo-payload"]
        args:
          - --api-base-url
          - "{{inputs.parameters.api-base-url}}"
          - --config-path
          - "{{inputs.parameters.config-path}}"
          - --config-b64
          - "{{inputs.parameters.config-b64}}"
          - --split-by
          - "{{inputs.parameters.split-by}}"
          - --backtest-id
          - "{{inputs.parameters.backtest-id}}"
          - --launch-curl
          - /tmp/launch-curl.txt
        envFrom:
          - secretRef:
              name: app-secrets
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: backtest-results
            mountPath: /data/backtest-results
      outputs:
        parameters:
          - name: launch-curl
            valueFrom:
              path: /tmp/launch-curl.txt

    - name: plan-shards
      inputs:
        parameters:
          - name: config-path
          - name: config-b64
          - name: split-by
          - name: backtest-id
      container:
        image: backtest-app:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            set -e
            if [ -n "{{inputs.parameters.backtest-id}}" ]; then
              WORK="/data/backtest-results/{{inputs.parameters.backtest-id}}"
            else
              WORK="/workspace"
            fi
            mkdir -p "$WORK"
            if [ -n "{{inputs.parameters.config-b64}}" ]; then
              echo "{{inputs.parameters.config-b64}}" | base64 -d > "$WORK/config.yaml"
              CONFIG="$WORK/config.yaml"
            else
              CONFIG="{{inputs.parameters.config-path}}"
            fi
            backtest plan-shards \
              --config "$CONFIG" \
              --work-dir "$WORK" \
              --manifest "$WORK/manifest.json" \
              --shards-param /tmp/shards-param.json \
              --split-by "{{inputs.parameters.split-by}}"
            echo "$WORK/manifest.json" > /tmp/manifest-path.txt
            echo "$WORK" > /tmp/work-dir.txt
        envFrom:
          - secretRef:
              name: app-secrets
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: backtest-results
            mountPath: /data/backtest-results
      outputs:
        parameters:
          - name: shards
            valueFrom:
              path: /tmp/shards-param.json
          - name: manifest-path
            valueFrom:
              path: /tmp/manifest-path.txt
          - name: work-dir
            valueFrom:
              path: /tmp/work-dir.txt

    - name: run-shard
      inputs:
        parameters:
          - name: shard-id
          - name: shard-config-path
          - name: shard-output-path
      container:
        image: backtest-app:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            set -e
            echo "Running shard {{inputs.parameters.shard-id}}"
            backtest run \
              --config "{{inputs.parameters.shard-config-path}}" \
              --output "{{inputs.parameters.shard-output-path}}" \
              --cache-dir /data/cache
            echo "{{inputs.parameters.shard-output-path}}" > /tmp/shard-output-path.txt
        envFrom:
          - secretRef:
              name: app-secrets
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: backtest-results
            mountPath: /data/backtest-results
          - name: backtest-cache
            mountPath: /data/cache
      outputs:
        parameters:
          - name: shard-output-path
            valueFrom:
              path: /tmp/shard-output-path.txt

    - name: merge-reports
      inputs:
        parameters:
          - name: manifest-path
          - name: output-path
          - name: backtest-id
      container:
        image: backtest-app:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            set -e
            backtest merge \
              --manifest "{{inputs.parameters.manifest-path}}" \
              --output "{{inputs.parameters.output-path}}" \
              --backtest-id "{{inputs.parameters.backtest-id}}"
            echo "{{inputs.parameters.output-path}}" > /tmp/merged-output-path.txt
        envFrom:
          - secretRef:
              name: app-secrets
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: backtest-results
            mountPath: /data/backtest-results
      outputs:
        parameters:
          - name: output-path
            valueFrom:
              path: /tmp/merged-output-path.txt
