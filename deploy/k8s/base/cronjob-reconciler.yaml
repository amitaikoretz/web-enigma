apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconciler
  labels:
    app.kubernetes.io/name: reconciler
    app.kubernetes.io/component: live-runtime
spec:
  schedule: "*/5 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: reconciler
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reconciler
              image: backtest-app:latest
              imagePullPolicy: IfNotPresent
              command:
                - kalyxctl
                - live-reconciler
                - --config
                - /app/config/live.yaml
                - --once
              envFrom:
                - secretRef:
                    name: app-secrets
              volumeMounts:
                - name: live-config
                  mountPath: /app/config/live.yaml
                  subPath: live.yaml
                  readOnly: true
          volumes:
            - name: live-config
              configMap:
                name: live-config
