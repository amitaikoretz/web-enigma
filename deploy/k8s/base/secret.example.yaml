# Template only — do not apply directly.
# Local dev: set ALPACA_* in your shell or repo-root .env, then run:
#
#   make sync-app-secrets
#
# Staging / manual creation:
#
#   kubectl create namespace backtest
#   kubectl create secret generic app-secrets -n backtest \
#     --from-literal=DATABASE_URL='postgresql+psycopg://postgres:postgres@postgres:5432/backtest' \
#     --from-literal=ALPACA_API_KEY='your-key' \
#     --from-literal=ALPACA_SECRET_KEY='your-secret' \
#
# The local overlay generates DATABASE_URL in app-secrets via kustomize; make k3s-deploy injects ALPACA_* from local env immediately after apply.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/backtest
  ALPACA_API_KEY: replace-me
  ALPACA_SECRET_KEY: replace-me
