apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backtest-results
spec:
  storageClassName: backtest-hostpath
  volumeName: backtest-results-host
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backtest-cache
spec:
  storageClassName: backtest-hostpath
  volumeName: backtest-cache-host
  accessModes:
    - ReadWriteOnce
