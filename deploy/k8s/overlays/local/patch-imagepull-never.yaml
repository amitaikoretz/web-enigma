apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      initContainers:
        - name: check-cli
          imagePullPolicy: Never
        - name: migrate
          imagePullPolicy: Never
      containers:
        - name: api
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
spec:
  template:
    spec:
      initContainers:
        - name: check-cli
          imagePullPolicy: Never
      containers:
        - name: controller
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: worker
spec:
  template:
    spec:
      initContainers:
        - name: check-cli
          imagePullPolicy: Never
      containers:
        - name: worker
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  template:
    spec:
      containers:
        - name: web
          imagePullPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
spec:
  template:
    spec:
      containers:
        - name: migrate
          imagePullPolicy: Never
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconciler
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: reconciler
              imagePullPolicy: Never
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backtest-reconciler
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: reconciler
              imagePullPolicy: Never
