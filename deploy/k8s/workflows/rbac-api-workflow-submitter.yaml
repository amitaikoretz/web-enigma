# Allows the in-cluster API (service account "api" in namespace "backtest") to submit
# and reconcile workflows in the backtest-workflows namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-workflow-submitter
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backtest-workflows
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-workflow-submitter
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backtest-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: api-workflow-submitter
subjects:
  - kind: ServiceAccount
    name: api
    namespace: backtest
