# Next step after volume_rally_tuned_5m: isolate gross edge (commission=0) and give
# winners more room (wider trail + higher target). Same universe/dates for comparison.
#
# Run:
#   backtest run \
#     --config experiments/volume_rally_gross_edge_5m.yaml \
#     --output /tmp/volume-rally-gross-edge-5m.json
#
# Compare against experiments/volume_rally_tuned_5m.yaml (commission 0.001, trail 1.5, tp 3.0).

global_config:
  timezone: "UTC"
  default_broker:
    cash: 10000
    commission: 0.0
    slippage_perc: 0.0
    sizer: fixed
  data_cache:
    enabled: true
    directory: ".cache/backtest-data"
    refresh_policy: "ttl"
    ttl_by_interval:
      "5m": 315360000

runs:
  - run_id: "gross_edge_aapl_5m"
    name: "AAPL volume_rally gross edge 5m"
    start_date: "2026-04-25"
    end_date: "2026-05-25"
    data:
      type: alpaca
      symbol: AAPL
      interval: 5m
      feed: iex
    strategy: "volume_rally"
    strategy_params:
      stake: 10
      volume_window: 20
      volume_spike_mult: 3.5
      breakout_lookback: 20
      atr_period: 14
      atr_expansion_mult: 0.5
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      adx_period: 14
      adx_min: 25.0
      sl_atr_mult: 1.5
      tp_atr_mult: 4.0
      trail_atr_mult: 2.5
      max_hold_bars: 72
      cooldown_bars: 20
    analyzers:
      include_equity_curve: true
      include_trade_log: true
      include_order_log: true

  - run_id: "gross_edge_amd_5m"
    name: "AMD volume_rally gross edge 5m"
    start_date: "2026-04-25"
    end_date: "2026-05-25"
    data:
      type: alpaca
      symbol: AMD
      interval: 5m
      feed: iex
    strategy: "volume_rally"
    strategy_params:
      stake: 10
      volume_window: 20
      volume_spike_mult: 3.5
      breakout_lookback: 20
      atr_period: 14
      atr_expansion_mult: 0.5
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      adx_period: 14
      adx_min: 25.0
      sl_atr_mult: 1.5
      tp_atr_mult: 4.0
      trail_atr_mult: 2.5
      max_hold_bars: 72
      cooldown_bars: 20
    analyzers:
      include_equity_curve: true
      include_trade_log: true
      include_order_log: true
